name: Bump Dependencies

on:
  schedule:
    - cron: '0 12 * * 1' # run every Monday at 12 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Bump dependencies in uv.lock
        run: uv lock --upgrade

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Bump uv.lock dependencies"
          title: "Bump uv.lock dependencies"
          branch: "uv-lock-update"
